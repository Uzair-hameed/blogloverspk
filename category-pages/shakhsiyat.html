<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شخصیات - مسلم تاریخ کے روشن ستارے | بلاگ لوورز</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- AOS Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        /* -------------------- FONT -------------------- */
        @font-face {
            font-family: 'Jameel Noori Nastaleeq';
            src: url('https://misbahur.com/fonts/Jameel Noori Nastaleeq.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Jameel Noori Nastaleeq', 'Noto Nastaliq Urdu', serif;
        }

        /* -------------------- VARIABLES & THEME (Neon Gradient) -------------------- */
        :root {
            --neon-blue: #4facfe;
            --neon-purple: #a855f7;
            --neon-gold: #fbbf24;
            --dark-bg: #0b0d10;
            --card-bg: #15181c;
            --text-light: #f1f1f1;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-glow: rgba(79, 172, 254, 0.25);
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 10% 20%, rgba(79, 172, 254, 0.08), transparent 40%),
                              radial-gradient(circle at 90% 70%, rgba(168, 85, 247, 0.08), transparent 40%);
            color: var(--text-light);
            font-size: 16px;
            line-height: 1.8;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* particles canvas */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        /* all main content above particles */
        .content-wrap {
            position: relative;
            z-index: 5;
        }

        /* -------------------- ACTION BUTTONS (fixed) -------------------- */
        .action-buttons {
            position: fixed;
            bottom: 25px;
            left: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .action-btn {
            background: linear-gradient(145deg, var(--neon-gold), #f59e0b);
            color: #0a0a0a;
            width: 50px;
            height: 50px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 20px rgba(251, 191, 36, 0.5);
            transition: 0.3s;
            border: 2px solid rgba(255,255,255,0.4);
            text-decoration: none;
        }
        .action-btn.blue {
            background: linear-gradient(145deg, var(--neon-blue), #3b82f6);
            box-shadow: 0 4px 20px rgba(79, 172, 254, 0.5);
        }
        .action-btn:hover {
            transform: scale(1.2) rotate(5deg);
            border-color: white;
        }

        /* back to main (blog lovers) */
        .back-home-fixed {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, var(--neon-gold), #f59e0b);
            color: black;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            z-index: 999;
            box-shadow: 0 0 25px rgba(251, 191, 36, 0.7);
            border: 2px solid white;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .back-home-fixed:hover {
            background: linear-gradient(135deg, var(--neon-blue), #3b82f6);
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* -------------------- BREADCRUMBS -------------------- */
        .breadcrumb-wrap {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-glow);
            margin-top: 70px;
        }
        .breadcrumb {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            font-size: 1.1rem;
            color: #aaa;
        }
        .breadcrumb a {
            color: var(--neon-gold);
            text-decoration: none;
            transition: 0.3s;
        }
        .breadcrumb a:hover { color: var(--neon-blue); }
        .breadcrumb .sep { color: #555; margin: 0 5px; }
        .breadcrumb .current { color: var(--neon-blue); }

        /* header */
        header {
            text-align: center;
            padding: 40px 20px 20px;
            position: relative;
        }
        .hero-icon {
            font-size: 4rem;
            filter: drop-shadow(0 0 20px var(--neon-gold));
            animation: floatIcon 3s ease-in-out infinite;
        }
        @keyframes floatIcon {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        h1 {
            font-size: 3.2rem;
            background: linear-gradient(135deg, var(--neon-gold), var(--neon-purple), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
            margin-bottom: 10px;
        }
        .hero-subtitle {
            max-width: 750px;
            margin: 10px auto;
            font-size: 1.25rem;
            color: #cfd9e6;
            padding: 0 15px;
        }

        /* Typewriter */
        .typewriter-wrap {
            min-height: 50px;
            margin: 15px auto;
            text-align: center;
        }
        #typewriter {
            font-size: 1.6rem;
            color: var(--neon-gold);
            display: inline-block;
            border-left: 3px solid var(--neon-blue);
            padding-right: 12px;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            0%,100% { border-color: var(--neon-blue); }
            50% { border-color: transparent; }
        }

        /* Category Stats */
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 25px 0 10px;
        }
        .stat-item {
            background: var(--glass-bg);
            backdrop-filter: blur(6px);
            border: 1px solid var(--border-glow);
            border-radius: 60px;
            padding: 8px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            color: #ccc;
        }
        .stat-item i { color: var(--neon-gold); }
        .stat-item span { color: white; font-weight: bold; margin-right: 5px; }

        /* main grid */
        .container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 15px;
        }
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin: 30px 0;
        }

        /* post card with neon glow */
        .post-card {
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.3);
            border: 1px solid rgba(79, 172, 254, 0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            position: relative;
        }
        .post-card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--neon-gold);
            box-shadow: 0 0 35px rgba(251, 191, 36, 0.3), 0 0 15px rgba(79, 172, 254, 0.2);
        }
        .post-card a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .post-card img {
            width: 100%;
            height: 190px;
            object-fit: cover;
            transition: 0.5s;
            border-bottom: 2px solid rgba(79, 172, 254, 0.3);
        }
        .post-card:hover img {
            transform: scale(1.05);
        }
        .card-content {
            padding: 16px 12px 14px;
            text-align: center;
        }
        .post-title {
            font-size: 1.05rem;
            color: #f0e6d8;
            line-height: 1.7;
        }
        .post-desc {
            font-size: 0.9rem;
            color: #aab3c0;
            margin-top: 8px;
        }

        /* Reactions Bar */
        .reactions-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin: 30px 0 10px;
            padding: 15px;
            background: var(--glass-bg);
            backdrop-filter: blur(6px);
            border-radius: 60px;
            border: 1px solid var(--border-glow);
        }
        .reaction-item {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
            font-size: 0.95rem;
        }
        .reaction-item:hover {
            background: rgba(79, 172, 254, 0.15);
            border-color: var(--neon-blue);
            transform: scale(1.05);
        }
        .reaction-item i {
            font-size: 1.3rem;
            color: var(--neon-gold);
        }
        .reaction-item .count {
            color: white;
            font-weight: bold;
            min-width: 18px;
        }

        /* social share */
        .share-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin: 35px 0 20px;
        }
        .social-btn {
            background: var(--card-bg);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: 0.3s;
            border: 2px solid var(--neon-gold);
            text-decoration: none;
        }
        .social-btn:hover {
            background: var(--neon-blue);
            color: #000;
            transform: scale(1.15) rotate(6deg);
            border-color: white;
        }

        /* footer */
        footer {
            background: #080a0d;
            text-align: center;
            padding: 35px 15px 25px;
            border-top: 3px solid var(--neon-purple);
            margin-top: 40px;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin: 20px 0;
        }
        .footer-links a {
            color: #aaa;
            text-decoration: none;
            transition: 0.3s;
            font-size: 1rem;
        }
        .footer-links a:hover { color: var(--neon-gold); }

        /* responsive */
        @media (max-width: 700px) {
            h1 { font-size: 2.4rem; }
            .posts-grid { grid-template-columns: 1fr 1fr; }
            .reactions-bar { border-radius: 30px; gap: 8px; }
            .reaction-item { padding: 4px 12px; font-size: 0.85rem; }
            .back-home-fixed span { display: none; }
        }
        @media (max-width: 450px) {
            .posts-grid { grid-template-columns: 1fr; }
            .hero-icon { font-size: 3rem; }
            #typewriter { font-size: 1.2rem; }
        }

        /* Loading spinner */
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--neon-gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

        // ============================================================
        // TYPEWRITER
        // ============================================================
        const phrases = CATEGORY_DATA.typewriterPhrases;
        let phraseIdx = 0, charIdx = 0, isDeleting = false;
        const typewriterEl = document.getElementById('typewriter');

        function typeEffect() {
            const currentPhrase = phrases[phraseIdx];
            if (!isDeleting) {
                typewriterEl.textContent = currentPhrase.substring(0, charIdx + 1);
                charIdx++;
                if (charIdx === currentPhrase.length) {
                    isDeleting = true;
                    setTimeout(typeEffect, 1800);
                    return;
                }
                setTimeout(typeEffect, 80);
            } else {
                typewriterEl.textContent = currentPhrase.substring(0, charIdx - 1);
                charIdx--;
                if (charIdx === 0) {
                    isDeleting = false;
                    phraseIdx = (phraseIdx + 1) % phrases.length;
                    setTimeout(typeEffect, 400);
                    return;
                }
                setTimeout(typeEffect, 40);
            }
        }
        typeEffect();

        // ============================================================

        function sharePage(platform) {
            let url = encodeURIComponent(window.location.href);
            let title = encodeURIComponent('شخصیات | بلاگ لوورز');
            let text = encodeURIComponent('مسلم تاریخ کی عظیم شخصیات');
            let shareLink = '';
            if (platform === 'facebook') shareLink = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
            else if (platform === 'twitter') shareLink = `https://twitter.com/intent/tweet?url=${url}&text=${text}`;
            else if (platform === 'whatsapp') shareLink = `https://api.whatsapp.com/send?text=${text}%20${url}`;
            else if (platform === 'telegram') shareLink = `https://t.me/share/url?url=${url}&text=${text}`;
            else if (platform === 'linkedin') shareLink = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`;
            else if (platform === 'copy') {
                navigator.clipboard?.writeText(window.location.href).then(() => alert('لنک کاپی ہو گیا!'));
                return;
            }
            if (shareLink) window.open(shareLink, '_blank', 'width=600,height=400');
        }

        // ============================================================
        // PARTICLES BACKGROUND
        // ============================================================
        (function initParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let w, h;
            const particles = [];
            const count = 80;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.vx = (Math.random() - 0.5) * 0.6;
                    this.vy = (Math.random() - 0.5) * 0.6;
                    this.radius = Math.random() * 2.2 + 1.2;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > w) this.vx *= -1;
                    if (this.y < 0 || this.y > h) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(79, 172, 254, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < count; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach(p => { p.update(); p.draw(); });
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(168, 85, 247, ${0.12 * (1 - dist/120)})`;
                            ctx.lineWidth = 0.6;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        })();

                try {
                    await fetch(`${BASE_API}/api/post-reaction`, {

                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            type: type,
                            category: CATEGORY_SLUG,
                            slug: CATEGORY_SLUG

                    });

                    console.warn('Reaction API failed:', err);

        // ============================================================
        // RENDER POSTS with API data enhancement
        // ============================================================
        async function renderPosts() {
            const grid = document.getElementById('postsGrid');
            const loader = document.getElementById('loaderContainer');
            
            // Use local posts data, but enhance with API if available
            const posts = CATEGORY_DATA.posts;
            
            // Clear loader
            loader.style.display = 'none';
            
            // Render each post
            for (const post of posts) {
                // Fetch reactions for this post
                let reactionCount = 0;
                try {
                    const reactions = await fetchPostReactions(post.slug);
                    if (reactions) {
                        reactionCount = Object.values(reactions).reduce((a, b) => a + b, 0);
                    }
                } catch (e) { /* ignore */ }

                const card = document.createElement('div');
                card.className = 'post-card';
                card.setAttribute('data-aos', 'fade-up');
                card.innerHTML = `
                    <a href="${post.url}">
                        <img src="${post.image}" alt="${post.title}" loading="lazy">
                        <div class="card-content">
                            <div class="post-title">${post.title}</div>
                            <div class="post-desc">${post.description}</div>
                            ${reactionCount > 0 ? `<div style="margin-top:6px;font-size:0.8rem;color:var(--neon-gold);"><i class="fas fa-heart"></i> ${reactionCount}</div>` : ''}
                        </div>
                    </a>
                `;
                grid.appendChild(card);
            }
        }
        renderPosts();
