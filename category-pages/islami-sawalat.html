    @font-face {

      src: url('https://cdn.jsdelivr.net/gh/ihsan-ch/urdu-fonts@main/fonts/JameelNooriNastaleeq.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;

    * {

      padding: 0;
      box-sizing: border-box;

    body {
      background: #0b0e1a;
      color: #e8f0f0;
      font-size: 16px;
      line-height: 1.8;
      min-height: 100vh;
      position: relative;
      padding-bottom: 60px;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }
    /* dark neon gradient overlay */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, #1a1f3a 0%, #0b0e1a 80%);
      z-index: -2;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 80% 70%, rgba(100, 70, 200, 0.15) 0%, transparent 60%);
      z-index: -1;
      pointer-events: none;

    /* ===== particles container ===== */

      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;

      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 12px 25px;
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #6a4f9b;
      box-shadow: 0 10px 30px -8px #2a1f4e;
      border-radius: 0 0 40px 40px;
    }
    .home-btn {
      background: linear-gradient(145deg, #2a1f4e, #1f1a3a);
      color: #e6d7ff;
      padding: 8px 22px;
      border-radius: 60px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: bold;
      border: 1px solid #7a5fc0;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 18px #4a2f8a;
      letter-spacing: 0.3px;
    }
    .home-btn:hover {
      background: #6a4f9b;
      color: #fff;
      border-color: #b394ff;
      transform: translateY(-2px);
      box-shadow: 0 0 30px #6a4f9b;
    }
    .logo-text {
      font-size: 1.9rem;
      font-weight: bold;
      color: #d4c2ff;
      text-shadow: 0 0 20px #7a5fc0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-text i { color: #f7d44a; }

    /* ===== social floating ===== */
    .social-share-float {
      position: fixed;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(15, 20, 40, 0.7);
      backdrop-filter: blur(8px);
      padding: 18px 10px;
      border-radius: 50px;
      border: 1px solid #6a4f9b;
      z-index: 99;
      box-shadow: 0 0 30px #2a1f4e;
    }
    .social-share-float a, .social-share-float button {
      background: transparent;
      border: none;
      font-size: 1.7rem;
      cursor: pointer;
      transition: 0.3s;
      color: #b394ff;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(30, 30, 60, 0.6);
      text-decoration: none;
      box-shadow: 0 0 10px #3a2a6a;
    }
    .social-share-float a:hover, .social-share-float button:hover {
      color: #f7d44a;
      background: #4a2f8a;
      transform: rotate(360deg) scale(1.1);
      box-shadow: 0 0 30px #b394ff;
    }

    /* ===== up/down ===== */
    .page-up-down {
      position: fixed;
      left: 22px;
      bottom: 35px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 99;
    }
    .up-btn, .down-btn {
      background: #1f1a3a;
      border: 2px solid #6a4f9b;
      color: #d4c2ff;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 0 20px #2a1f4e;
      text-decoration: none;
    }
    .up-btn:hover, .down-btn:hover {
      background: #6a4f9b;
      color: #f7d44a;
      border-color: #b394ff;
      transform: scale(1.08);
      box-shadow: 0 0 35px #6a4f9b;
    }

    /* ===== breadcrumb ===== */
    .breadcrumb {
      max-width: 1300px;
      margin: 20px auto 5px;
      padding: 0 20px;
      font-size: 1rem;
      color: #b394ff;
      background: transparent;
    }
    .breadcrumb a {
      color: #d4c2ff;
      text-decoration: none;
      transition: 0.3s;
    }
    .breadcrumb a:hover { color: #f7d44a; text-shadow: 0 0 10px #f7d44a; }
    .breadcrumb span { color: #f7d44a; }

    /* ===== hero ===== */
    .hero-section {
      max-width: 1300px;
      margin: 15px auto 25px;
      padding: 20px 25px;
      background: rgba(15, 20, 45, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 60px;
      border: 1px solid #6a4f9b;
      box-shadow: 0 0 50px #1a1f3a;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero-section .hero-icon {
      font-size: 4rem;
      color: #f7d44a;
      text-shadow: 0 0 30px #f7d44a;
    }
    .hero-section h1 {
      font-size: 2.6rem;
      color: #f0eaff;
      text-shadow: 0 0 30px #6a4f9b;
      margin: 5px 0;
    }
    .hero-section p {
      font-size: 1.2rem;
      max-width: 800px;
      margin: 10px auto;
      color: #d4d4f0;
    }
    .typewriter-box {
      background: rgba(30, 30, 70, 0.5);
      border-radius: 60px;
      padding: 12px 30px;
      display: inline-block;
      border: 1px solid #7a5fc0;
      margin-top: 12px;
      font-size: 1.3rem;
      color: #f7d44a;
      min-height: 60px;
      box-shadow: 0 0 30px #3a2a6a;
    }
    #typewriter {
      display: inline;
      border-left: 2px solid #f7d44a;
      padding-right: 6px;
    }

    /* ===== stats cards ===== */
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      max-width: 1300px;
      margin: 10px auto 30px;
      padding: 0 20px;
    }
    .stat-card {
      background: rgba(15, 20, 45, 0.6);
      backdrop-filter: blur(8px);
      border: 1px solid #6a4f9b;
      border-radius: 40px;
      padding: 12px 30px;
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow: 0 0 30px #1a1f3a;
      transition: 0.3s;
    }
    .stat-card:hover { border-color: #f7d44a; box-shadow: 0 0 40px #6a4f9b; }
    .stat-card i { font-size: 2rem; color: #f7d44a; }
    .stat-card .stat-num { font-size: 1.6rem; font-weight: bold; color: #fff; }

    /* ===== posts grid ===== */
    .container {
      max-width: 1300px;
      margin: 20px auto;
      padding: 15px;
      position: relative;
      z-index: 2;
    }
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 40px 25px;
    }
    .post-card {
      background: rgba(15, 20, 45, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 40px 40px 30px 30px;
      overflow: hidden;
      border: 2px solid #3a2a6a;
      box-shadow: 0 20px 30px -5px #0a0e1a;
      transition: all 0.35s ease;
      transform: translateY(0);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
    }
    .post-card:hover {
      transform: translateY(-16px) scale(1.01);
      box-shadow: 0 35px 40px -8px #2a1f4e, 0 0 40px #4a2f8a;
      border-color: #b394ff;
    }
    .img-container {
      height: 180px;
      overflow: hidden;
      position: relative;
      margin: 12px 12px 0 12px;
      border-radius: 30px 30px 18px 18px;
      box-shadow: inset 0 0 20px #1a1f3a;
    }
    .img-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.8s;
      display: block;
      border-radius: 30px 30px 18px 18px;
    }
    .post-card:hover .img-container img {
      transform: scale(1.15) rotate(2deg);
    }
    .card-content {
      padding: 18px 10px 22px;
      text-align: center;
    }
    .post-title {
      font-size: 1.1rem;
      color: #e0d6ff;
      margin-bottom: 6px;
      line-height: 1.7;
      font-weight: bold;
      text-shadow: 0 0 10px #2a1f4e;
      background: rgba(30, 30, 70, 0.3);
      padding: 8px 8px;
      border-radius: 60px;
      border: 1px solid #4a2f8a;
    }

    /* ===== reactions ===== */
    .reactions-section {
      max-width: 1300px;
      margin: 30px auto 20px;
      padding: 25px;
      background: rgba(15, 20, 45, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      border: 1px solid #6a4f9b;
      text-align: center;
    }
    .reactions-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }
    .reaction-item {
      background: rgba(30, 30, 70, 0.5);
      padding: 10px 24px;
      border-radius: 60px;
      border: 1px solid #4a2f8a;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: 0.3s;
      cursor: pointer;
      color: #d4c2ff;
      font-size: 1.2rem;
    }
    .reaction-item:hover {
      background: #4a2f8a;
      border-color: #f7d44a;
      box-shadow: 0 0 30px #6a4f9b;
      color: #fff;
    }
    .reaction-item i { font-size: 2rem; color: #f7d44a; }
    .reaction-count { font-weight: bold; color: #fff; }

    /* ===== footer ===== */
    footer {
      text-align: center;
      padding: 30px 20px;
      background: rgba(10, 14, 30, 0.8);
      backdrop-filter: blur(6px);
      margin-top: 50px;
      border-top: 2px solid #6a4f9b;
      color: #b394ff;
      border-radius: 60px 60px 0 0;
      position: relative;
      z-index: 2;
    }
    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 25px;
      margin: 15px 0;
    }
    .footer-links a {
      color: #d4c2ff;
      text-decoration: none;
      transition: 0.3s;
    }
    .footer-links a:hover { color: #f7d44a; text-shadow: 0 0 10px #f7d44a; }

    /* ===== responsive ===== */
    @media (max-width: 700px) {
      .hero-section h1 { font-size: 2rem; }
      .typewriter-box { font-size: 1rem; padding: 10px 20px; }
      .logo-text { font-size: 1.4rem; }
      .home-btn span { display: none; }
      .social-share-float { right: 8px; gap: 10px; padding: 12px 6px; }
      .social-share-float a { font-size: 1.4rem; width: 38px; height: 38px; }
      .page-up-down { left: 12px; bottom: 25px; }
      .up-btn, .down-btn { width: 44px; height: 44px; font-size: 1.6rem; }
      .posts-grid { gap: 25px; }
    }

    });

    // ===== TYPEWRITER =====
    const phrases = CATEGORY_DATA.typewriterPhrases || ['اسلامی سوالات'];
    let idx = 0, charIdx = 0, isDeleting = false;
    const tw = document.getElementById('typewriter');
    function typeEffect() {
      const current = phrases[idx];
      if (!isDeleting) {
        tw.textContent = current.substring(0, charIdx+1);
        charIdx++;
        if (charIdx === current.length) { isDeleting = true; setTimeout(typeEffect, 2000); return; }
        setTimeout(typeEffect, 80);
      } else {
        tw.textContent = current.substring(0, charIdx-1);
        charIdx--;
        if (charIdx === 0) { isDeleting = false; idx = (idx+1)%phrases.length; setTimeout(typeEffect, 500); return; }
        setTimeout(typeEffect, 40);
      }
    }
    typeEffect();

    // ===== RENDER POSTS =====
    const grid = document.getElementById('postsGrid');
    CATEGORY_DATA.posts.forEach(p => {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.setAttribute('data-aos', 'fade-up');
      card.onclick = () => window.location.href = p.url;
      card.innerHTML = `
        <div class="img-container"><img src="${p.image}" alt="${p.title}" loading="lazy"></div>
        <div class="card-content"><h3 class="post-title">${p.title}</h3></div>
      `;
      grid.appendChild(card);
    });

    // ===== REACTIONS =====
    const rGrid = document.getElementById('reactionsGrid');
    const reactionMap = {
      excellent: '🌟', interesting: '🤩', useful: '💡', thoughtful: '🤔', contemplative: '🧘', wonderful: '✨', awesome: '🔥'
    };
    const reactionKeys = Object.keys(CATEGORY_DATA.reactions);
    reactionKeys.forEach(key => {
      const div = document.createElement('div');
      div.className = 'reaction-item';
      div.innerHTML = `<i class="fas fa-${key === 'excellent' ? 'star' : key === 'interesting' ? 'eye' : key === 'useful' ? 'lightbulb' : key === 'thoughtful' ? 'brain' : key === 'contemplative' ? 'spa' : key === 'wonderful' ? 'magic' : 'rocket'}"></i> ${reactionMap[key] || key} <span class="reaction-count" id="r-${key}">0</span>`;
      rGrid.appendChild(div);
      div.onclick = () => {
        fetch('https://bloglovers-api.uzairhameed01.workers.dev/api/post-reaction', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug: CATEGORY_DATA.slug, type: key })
        }).then(res => res.json()).then(data => {
          if (data.success) {
            CATEGORY_DATA.reactions[key] = (CATEGORY_DATA.reactions[key] || 0) + 1;
            document.getElementById(`r-${key}`).textContent = CATEGORY_DATA.reactions[key];
          }
        }).catch(console.warn);
      };
    });

    // ===== FETCH STATS =====
    function fetchStats() {
      fetch('https://bloglovers-api.uzairhameed01.workers.dev/api/home-stats')
        .then(r => r.json()).then(data => {
          if (data.views) document.getElementById('statViews').textContent = data.views;
          if (data.shares) document.getElementById('statShares').textContent = data.shares;
          if (data.reactions) document.getElementById('statReactions').textContent = data.reactions;
        }).catch(()=>{});
      // fetch category reactions
      fetch(`https://bloglovers-api.uzairhameed01.workers.dev/api/category-stats/${CATEGORY_DATA.slug}`)
        .then(r => r.json()).then(data => {
          if (data.reactions) {
            Object.keys(data.reactions).forEach(k => {
              if (document.getElementById(`r-${k}`)) {
                document.getElementById(`r-${k}`).textContent = data.reactions[k];
                CATEGORY_DATA.reactions[k] = data.reactions[k];
              }
            });
          }
        }).catch(()=>{});
    }
    fetchStats();

    // ===== SHARE =====
    window.sharePage = function(platform) {
      const url = encodeURIComponent(window.location.href);
      const title = encodeURIComponent('اسلامی سوالات | بلاگ لوورز');
      let shareLink = '';
      switch(platform) {
        case 'facebook': shareLink = `https://www.facebook.com/sharer/sharer.php?u=${url}`; break;
        case 'twitter': shareLink = `https://twitter.com/intent/tweet?url=${url}&text=${title}`; break;
        case 'whatsapp': shareLink = `https://wa.me/?text=${title}%20${url}`; break;
        case 'telegram': shareLink = `https://t.me/share/url?url=${url}&text=${title}`; break;
        case 'linkedin': shareLink = `https://www.linkedin.com/sharing/share-offsite/?url=${url}`; break;
        case 'copy': navigator.clipboard.writeText(window.location.href).then(() => alert('لنک کاپی ہو گیا!')); return;
        default: return;
      }
      if (shareLink) window.open(shareLink, '_blank', 'width=600,height=450');
      // call share api
      fetch('https://bloglovers-api.uzairhameed01.workers.dev/api/share-site', { method: 'POST' }).catch(()=>{});
    };

    // ===== FOOTER LINKS =====
    const footerDiv = document.getElementById('footerLinks');
    const allLinks = [...CATEGORY_DATA.footerCategories, ...CATEGORY_DATA.usefulLinks];
    allLinks.forEach(link => {
      const a = document.createElement('a');
      a.href = link.url;
      a.textContent = link.name;
      a.target = '_blank';
      footerDiv.appendChild(a);
    });
    // add social icons
    const socials = CATEGORY_DATA.socialLinks;
    Object.values(socials).forEach(url => {
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.innerHTML = '<i class="fas fa-share-alt"></i>';
      footerDiv.appendChild(a);
    });

    // ===== ADD VIEW =====
    fetch('https://bloglovers-api.uzairhameed01.workers.dev/api/add-view', { method: 'POST' }).catch(()=>{});
  </script>
</body>
</html>
